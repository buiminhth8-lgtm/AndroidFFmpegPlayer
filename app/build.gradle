plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-android'
    id 'kotlin-kapt'
    id 'com.google.devtools.ksp'
}

ksp {
    arg("AROUTER_MODULE_NAME", project.getName())
}

android.sourceSets.configureEach { it.java.srcDir("build/generated/ksp/${it.name}/kotlin/") }
android {
    namespace 'com.example.motro'
    compileSdk 36
    defaultConfig {
        applicationId "ccom.example.motro"
        minSdk 31
        targetSdk 36
        versionCode 6
        versionName "1.0.0.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        javaCompileOptions {
            annotationProcessorOptions {
                arguments = [AROUTER_MODULE_NAME: project.getName()]
            }
        }
        ndk {
            // 鎸囧畾鍙墦鍖?armeabi-v7a 鍜?arm64-v8a
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }
    

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    buildTypes {
        release {
            debuggable true // 纭繚璁剧疆涓?true
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

        }
        debug {
            debuggable true // 纭繚璁剧疆涓?true
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    kotlin {
        jvmToolchain(17)
    }

    buildFeatures {
        viewBinding true
    }


    applicationVariants.all { variant ->
        variant.outputs.all {
            if (variant.buildType.name == "release") {
                def versionName = variant.versionName ?: "1.0"
                def timestamp = new Date().format("yyyyMMdd_HHmmss", TimeZone.getTimeZone("GMT+8")) // 涓浗鏃堕棿
                def fileName = "app_release_v${versionName}_${timestamp}.apk"
                outputFileName = fileName
            }
        }
    }

}


configurations.configureEach {
    exclude group: 'com.android.support'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')

    implementation("androidx.multidex:multidex:2.0.1")
